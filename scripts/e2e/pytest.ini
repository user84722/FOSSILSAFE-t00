[pytest]
# Pytest configuration for E2E tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    install: Installation tests
    api: API tests
    ui: UI tests (Playwright)
    websocket: WebSocket tests
    slow: Slow tests (skip in fast mode)
    requires_hardware: Tests requiring real hardware

# Test paths
testpaths = .

# Ignore patterns
norecursedirs = .git .tox dist build *.egg fixtures

# Timeout (optional)
# timeout = 300

# Playwright specific
# (configured in conftest.py)
